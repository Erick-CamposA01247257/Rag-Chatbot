<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; padding: 16px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; font-weight: 600; }
        .header-btns { display: flex; gap: 8px; }
        .btn { border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; background: white; color: #888; }
        .btn:hover { background: #f5f5f5; }
        .btn-reprocesar { background: #185FA5; color: white; border: none; }
        .btn-reprocesar:hover { background: #0C447C; }
        .chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .mensaje { max-width: 75%; }
        .mensaje.usuario { align-self: flex-end; }
        .mensaje.asistente { align-self: flex-start; }
        .burbuja { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .usuario .burbuja { background: #185FA5; color: white; border-radius: 12px 12px 2px 12px; }
        .asistente .burbuja { background: white; color: #333; border-radius: 12px 12px 12px 2px; border: 1px solid #eee; }
        .fuentes { margin-top: 8px; }
        .fuente { font-size: 11px; color: #888; background: #f9f9f9; border: 1px solid #eee; border-radius: 6px; padding: 6px 10px; margin-top: 4px; }
        .fuente-label { font-weight: 500; color: #185FA5; }
        .typing { background: white; color: #888; align-self: flex-start; border-radius: 12px; padding: 12px 16px; font-size: 14px; border: 1px solid #eee; }
        .bienvenida { text-align: center; color: #888; font-size: 14px; margin: auto; }
        .input-area { background: white; padding: 16px 24px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
        input:focus { border-color: #185FA5; }
        button.enviar { background: #185FA5; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
        button.enviar:hover { background: #0C447C; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📄 RAG Chatbot — TechFlow Solutions</h1>
        <div class="header-btns">
            <button class="btn btn-reprocesar" onclick="reprocesar()">Reprocesar documentos</button>
            <button class="btn" onclick="limpiarChat()">Nueva conversación</button>
        </div>
    </div>

    <div class="chat" id="chat">
        <div class="bienvenida" id="bienvenida">
            Hazme una pregunta sobre los documentos de la empresa
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="input"
            placeholder="¿Cuántos días de vacaciones tengo?"
            onkeypress="if(event.key==='Enter') enviar()"
        />
        <button class="enviar" onclick="enviar()">Enviar</button>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById("input")
            const mensaje = input.value.trim()
            if (!mensaje) return

            document.getElementById("bienvenida")?.remove()
            input.value = ""

            agregarMensaje(mensaje, "usuario")

            const typing = document.createElement("div")
            typing.className = "typing"
            typing.id = "typing"
            typing.textContent = "Buscando en documentos..."
            document.getElementById("chat").appendChild(typing)
            scrollAbajo()

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mensaje })
            })

            const data = await response.json()
            document.getElementById("typing")?.remove()

            agregarMensajeConFuentes(data.respuesta, data.fuentes)
        }

        function agregarMensaje(texto, tipo) {
            const div = document.createElement("div")
            div.className = `mensaje ${tipo}`
            const burbuja = document.createElement("div")
            burbuja.className = "burbuja"
            burbuja.innerHTML = texto
             .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
             .replace(/\n/g, '<br>')
            div.appendChild(burbuja)
            document.getElementById("chat").appendChild(div)
            scrollAbajo()
        }

        function agregarMensajeConFuentes(texto, fuentes) {
            const div = document.createElement("div")
            div.className = "mensaje asistente"

            const burbuja = document.createElement("div")
            burbuja.className = "burbuja"
            burbuja.innerHTML = texto
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
            div.appendChild(burbuja)

            if (fuentes && fuentes.length > 0) {
                const fuentesDiv = document.createElement("div")
                fuentesDiv.className = "fuentes"
                fuentes.forEach((f, i) => {
                    const fuente = document.createElement("div")
                    fuente.className = "fuente"
                    fuente.innerHTML = `<span class="fuente-label">Fuente ${i+1}:</span> ${f}`
                    fuentesDiv.appendChild(fuente)
                })
                div.appendChild(fuentesDiv)
            }

            document.getElementById("chat").appendChild(div)
            scrollAbajo()
        }

        function scrollAbajo() {
            const chat = document.getElementById("chat")
            chat.scrollTop = chat.scrollHeight
        }

        async function limpiarChat() {
            document.getElementById("chat").innerHTML =
                '<div class="bienvenida" id="bienvenida">Hazme una pregunta sobre los documentos de la empresa</div>'
        }

        async function reprocesar() {
            const btn = document.querySelector(".btn-reprocesar")
            btn.textContent = "Reprocesando..."
            btn.disabled = true

            const response = await fetch("/reprocesar", { method: "POST" })
            const data = await response.json()

            btn.textContent = "Reprocesar documentos"
            btn.disabled = false

            alert(data.mensaje)
        }
    </script>
</body>
</html>
